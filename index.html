<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Ngày 8/3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0015 0%, #1a0a2e 50%, #0a0015 100%);
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
        }

        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .heart-container {
            position: fixed;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 95vmin;
            height: 95vmin;
            z-index: 1;
        }

        .heart {
            position: relative;
            width: 100%;
            height: 100%;
            animation: heartbeat 2s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.05); }
            50% { transform: scale(1); }
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            animation: twinkle 2s ease-in-out infinite;
            transform: translate(-50%, -50%);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            text-align: center;
            animation: fadeInDown 1.5s ease-out;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 215, 0, 0.6);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(255, 182, 193, 0.3);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            background: linear-gradient(45deg, #ffd700, #ffb6c1, #ffa07a, #ff69b4);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            font-weight: bold;
            margin-bottom: 10px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            color: #ffb6c1;
            text-shadow: 0 0 20px rgba(255, 182, 193, 0.6);
            animation: glow 2s ease-in-out infinite;
            white-space: nowrap;
            margin: 0;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 182, 193, 0.6); }
            50% { text-shadow: 0 0 40px rgba(255, 182, 193, 1); }
        }

        .photo-slider {
            position: fixed;
            width: 100%;
            height: 120px;
            overflow: hidden;
            pointer-events: none;
            z-index: 5;
        }

        .photo-slider.top {
            top: 0;
        }

        .photo-slider.bottom {
            bottom: 0;
        }

        .slider-track {
            display: flex;
            gap: 20px;
            animation: slideLeft 20s linear infinite;
        }

        .slider-track.reverse {
            animation: slideRight 20s linear infinite;
        }

        @keyframes slideLeft {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes slideRight {
            0% { transform: translateX(-50%); }
            100% { transform: translateX(0); }
        }

        .slider-img {
            width: 100px;
            height: 100px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(255, 182, 193, 0.5);
            border: 2px solid rgba(255, 215, 0, 0.6);
            flex-shrink: 0;
            animation: wave 3s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% {
                transform: translateY(0) rotate(0deg) scale(1);
            }
            25% {
                transform: translateY(-15px) rotate(5deg) scale(1.05);
            }
            50% {
                transform: translateY(0) rotate(0deg) scale(1);
            }
            75% {
                transform: translateY(15px) rotate(-5deg) scale(1.05);
            }
        }

        .slider-img.error {
            display: none;
        }

        .message {
            position: relative;
            z-index: 20;
            max-width: 600px;
            text-align: center;
            color: #fff;
            font-size: clamp(1rem, 2.5vw, 1.3rem);
            line-height: 1.8;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 2px solid rgba(255, 182, 193, 0.3);
            animation: fadeInUp 2s ease-out 0.5s both;
            box-shadow: 0 8px 32px rgba(255, 215, 0, 0.2);
        }

        .message p {
            white-space: nowrap;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .sparkle {
            position: fixed;
            pointer-events: none;
            z-index: 30;
        }

        .sparkle::before {
            content: '✨';
            font-size: 20px;
            animation: sparkleAnim 1.5s ease-out forwards;
        }

        @keyframes sparkleAnim {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0);
            }
            50% {
                transform: translateY(-30px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(0);
            }
        }

        .shooting-star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px rgba(255, 255, 255, 0.8);
            animation: shootingStar 3s linear infinite;
            z-index: 2;
        }

        .shooting-star::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 100%);
        }

        @keyframes shootingStar {
            0% {
                transform: translate(0, 0);
                opacity: 1;
            }
            70% {
                opacity: 1;
            }
            100% {
                transform: translate(-500px, 500px);
                opacity: 0;
            }
        }

        .snowflake {
            position: fixed;
            top: -10px;
            color: #fff;
            font-size: 1em;
            opacity: 0.8;
            animation: snowfall linear infinite;
            z-index: 2;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        @keyframes snowfall {
            0% {
                transform: translateY(0) rotate(0deg);
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
            }
        }

        .falling-flower {
            position: fixed;
            font-size: 2em;
            opacity: 0.7;
            animation: flowerFall linear infinite;
            z-index: 3;
        }

        @keyframes flowerFall {
            0% {
                transform: translateY(110vh) rotate(0deg);
            }
            100% {
                transform: translateY(-10vh) rotate(-360deg);
            }
        }

        .falling-number {
            position: fixed;
            font-size: 2.5em;
            font-weight: bold;
            background: linear-gradient(45deg, #ffd700, #ff69b4, #ffa07a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.8;
            animation: numberFall linear infinite;
            z-index: 3;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        @keyframes numberFall {
            0% {
                transform: translateY(-10vh) rotate(0deg) scale(1);
                opacity: 0.8;
            }
            50% {
                transform: translateY(50vh) rotate(180deg) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg) scale(1);
                opacity: 0.8;
            }
        }

        @media (max-width: 768px) {
            .heart-container {
                width: 100vmin;
                height: 100vmin;
            }
            
            .title {
                padding: 15px 25px;
            }
            
            .message {
                padding: 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="heart-container">
        <div class="heart" id="heart"></div>
    </div>

    <audio id="bgMusic" loop>
        <source src="Iu Là Đây.mp3" type="audio/mpeg">
    </audio>

    <div class="photo-slider top" id="topSlider"></div>
    <div class="photo-slider bottom" id="bottomSlider"></div>
    <div id="shootingStars"></div>
    <div id="snowflakes"></div>
    <div id="flowers"></div>
    <div id="numbers"></div>

    <div class="container">

        <div class="message">
            <p>🌹 Mừng ngày 8/3 Cô Giáo Nhỏ 🌹</p>
            <p>💐 Chúc Nhẫn mãi xinh đẹp, vui vẻ, hạnh phúc! 💐</p>
        </div>
    </div>

    <script>
        // Tạo trái tim từ hàng triệu hạt sáng
        function createHeart() {
            const heart = document.getElementById('heart');
            const colors = ['#90ee90', '#ff6b9d', '#ffd700', '#00d4ff', '#ba55d3', '#ff8c94', '#66cdaa', '#ffa07a', '#7b68ee', '#98fb98'];
            
            // Tạo nhiều lớp để lấp đầy trái tim
            for (let layer = 0; layer < 10; layer++) {
                const particlesPerLayer = 200;
                const scale = 2.5 - (layer * 0.22);
                
                for (let i = 0; i < particlesPerLayer; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    
                    const t = (i / particlesPerLayer) * Math.PI * 2;
                    const x = 16 * Math.pow(Math.sin(t), 3);
                    const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                    
                    particle.style.left = `${50 + x * scale}%`;
                    particle.style.top = `${50 + y * scale}%`;
                    particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    particle.style.animationDelay = `${Math.random() * 2}s`;
                    particle.style.boxShadow = `0 0 8px ${colors[Math.floor(Math.random() * colors.length)]}`;
                    
                    heart.appendChild(particle);
                }
            }
        }

        // Tạo sao băng
        function createShootingStars() {
            const container = document.getElementById('shootingStars');
            setInterval(() => {
                const star = document.createElement('div');
                star.className = 'shooting-star';
                star.style.top = Math.random() * 50 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.animationDuration = (Math.random() * 2 + 2) + 's';
                container.appendChild(star);
                setTimeout(() => star.remove(), 3000);
            }, 2000);
        }

        // Tạo tuyết rơi
        function createSnowflakes() {
            const container = document.getElementById('snowflakes');
            for (let i = 0; i < 50; i++) {
                const snowflake = document.createElement('div');
                snowflake.className = 'snowflake';
                snowflake.innerHTML = '❄';
                snowflake.style.left = Math.random() * 100 + '%';
                snowflake.style.fontSize = (Math.random() * 1 + 0.5) + 'em';
                snowflake.style.animationDuration = (Math.random() * 5 + 5) + 's';
                snowflake.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(snowflake);
            }
        }

        // Tạo hoa rơi
        function createFallingFlowers() {
            const container = document.getElementById('flowers');
            const flowers = ['🌹', '🌸', '🌺', '💐', '🌷'];
            for (let i = 0; i < 20; i++) {
                const flower = document.createElement('div');
                flower.className = 'falling-flower';
                flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                flower.style.left = Math.random() * 100 + '%';
                flower.style.animationDuration = (Math.random() * 8 + 8) + 's';
                flower.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(flower);
            }
        }

        // Tạo số 8 và 3 rơi
        function createFallingNumbers() {
            const container = document.getElementById('numbers');
            const numbers = ['8', '3'];
            for (let i = 0; i < 15; i++) {
                const number = document.createElement('div');
                number.className = 'falling-number';
                number.innerHTML = numbers[i % 2];
                number.style.left = Math.random() * 100 + '%';
                number.style.animationDuration = (Math.random() * 10 + 10) + 's';
                number.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(number);
            }
        }

        // Tạo slide ảnh
        function createPhotoSliders() {
            const photos = [
                '1.jpg', '2.jpg', '3.jpg', '4.jpg',
                '5.jpg', '6.jpg', '7.jpg', '8.jpg',
                '9.jpg', '10.jpg', '11.jpg', '12.jpg',
                '13.jpg', '14.jpg', '15.jpg', '16.jpg',
                '17.jpg', '18.jpg', '19.jpg', '20.jpg'
            ];
            
            // Xáo trộn thứ tự ảnh
            const shuffled = photos.sort(() => Math.random() - 0.5);
            
            const topSlider = document.getElementById('topSlider');
            const bottomSlider = document.getElementById('bottomSlider');
            
            const topTrack = document.createElement('div');
            topTrack.className = 'slider-track';
            
            const bottomTrack = document.createElement('div');
            bottomTrack.className = 'slider-track reverse';
            
            // Nhân đôi ảnh để tạo vòng lặp liền mạch
            const doublePhotos = [...shuffled, ...shuffled];
            
            doublePhotos.forEach((photo, index) => {
                const img1 = document.createElement('img');
                img1.src = photo;
                img1.className = 'slider-img';
                img1.style.animationDelay = `${index * 0.1}s`;
                img1.onerror = function() { this.classList.add('error'); };
                topTrack.appendChild(img1);
                
                const img2 = document.createElement('img');
                img2.src = photo;
                img2.className = 'slider-img';
                img2.style.animationDelay = `${index * 0.1}s`;
                img2.onerror = function() { this.classList.add('error'); };
                bottomTrack.appendChild(img2);
            });
            
            topSlider.appendChild(topTrack);
            bottomSlider.appendChild(bottomTrack);
        }

        // Tạo hiệu ứng sparkle khi click
        document.addEventListener('click', (e) => {
            for (let i = 0; i < 3; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = `${e.clientX + (Math.random() - 0.5) * 40}px`;
                sparkle.style.top = `${e.clientY + (Math.random() - 0.5) * 40}px`;
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 1500);
            }
        });

        // Khởi tạo
        createHeart();
        createPhotoSliders();
        createShootingStars();
        createSnowflakes();
        createFallingFlowers();
        createFallingNumbers();

        // Phát nhạc khi click
        const music = document.getElementById('bgMusic');
        document.addEventListener('click', () => {
            if (music.paused) {
                music.play().catch(e => console.log('Autoplay prevented'));
            }
        }, { once: true });

        // Thêm particles liên tục
        setInterval(() => {
            const particles = document.querySelectorAll('.particle');
            particles.forEach(p => {
                if (Math.random() > 0.95) {
                    p.style.transform = `scale(${1 + Math.random()})`;
                    setTimeout(() => p.style.transform = 'scale(1)', 300);
                }
            });
        }, 100);
    </script>
</body>
</html>
